name: C CI

env:
  ARTIFACT_PATH: src/data/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: make lr1
        run: |
          echo "--- build ---"
          make build_lr1
          echo "--- run ---"

      - name: run lr1
        run: |
          echo "--- start ---"
          ./src/labs/n1/lab1.exe
          echo "--- finish ---"

      - name: make clean
        run: make clean
      - uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: ${{ env.ARTIFACT_PATH }}

  create_graph:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: download python packages
        run: pip install matplotlib

      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: ${{ env.ARTIFACT_PATH }}
      - run: python3 src/utils/create.py

      - uses: actions/upload-artifact@v5
        with:
          name: graphs
          path: ${{ env.ARTIFACT_PATH }}/graphs
        run:
