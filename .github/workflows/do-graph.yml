name: Graph Creating

on:
  workflow_dispatch:
    inputs:
      LAB_WORK_NUMBER:
        description: "Какая лабораторная (lr1, lr2)"
        required: true
        default: "n"
        type: choice
        options:
          - lr1
          - lr2
          - n

env:
  ARTIFACT_PATH: src/data/

jobs:
  make_lr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: make and run lr
        run: |
          echo "--- start ---"
          make ${{ inputs.LAB_WORK_NUMBER }}
          echo "--- finish ---"
          mkdir -p ${{ env.ARTIFACT_PATH }}
          date +"%Y-%m-%d %H:%M:%S" > ${{ env.ARTIFACT_PATH }}data.md

      - uses: actions/upload-artifact@v5
        with:
          name: make-output
          path: ${{ env.ARTIFACT_PATH }}

  create_graph:
    runs-on: ubuntu-latest
    needs: make_lr
    steps:
      - uses: actions/checkout@v5

      - name: download python packages
        run: pip install matplotlib

      - uses: actions/download-artifact@v5
        with:
          name: make-output
          path: ${{ env.ARTIFACT_PATH }}

      - run: |
          mkdir -p ${{ env.ARTIFACT_PATH }}/graphs
          python3 src/utils/create.py
          date +"%Y-%m-%d %H:%M:%S" > ${{ env.ARTIFACT_PATH }}/raw/data.md

      - uses: actions/upload-artifact@v5
        with:
          name: created_graphs
          path: ${{ env.ARTIFACT_PATH }}/graphs
